<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Breakout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0f172a; /* Slate 900 */
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on mobile */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #020617;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            border: 2px solid #334155;
            border-radius: 8px;
            max-width: 100%;
            max-height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.85);
            z-index: 10;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.7);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 1.2rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .stat-box {
            background: rgba(30, 41, 59, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="ui-layer">
        <div class="stat-box">SCORE: <span id="scoreEl">0</span></div>
        <div class="stat-box">LEVEL: <span id="levelEl">1</span></div>
        <div class="stat-box">LIVES: <span id="livesEl">3</span></div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay">
        <h1 class="text-6xl mb-4 font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500" style="filter: drop-shadow(0 0 10px rgba(56,189,248,0.5));">NEON BREAKER</h1>
        <p class="mb-8 text-slate-300">Click or Tap to Start</p>
        <button id="startBtn" class="btn">PLAY</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="text-5xl mb-2 text-red-500 font-bold">GAME OVER</h1>
        <p class="text-2xl mb-6">Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn" class="btn">TRY AGAIN</button>
    </div>
    
    <!-- Victory Screen -->
    <div id="victoryScreen" class="overlay hidden">
        <h1 class="text-5xl mb-2 text-green-400 font-bold">YOU WON!</h1>
        <p class="text-xl mb-6 text-slate-300">Great Job!</p>
        <button id="playAgainBtn" class="btn">PLAY AGAIN</button>
    </div>
</div>

<script>
    /**
     * Game Configuration & State
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const scoreEl = document.getElementById('scoreEl');
    const livesEl = document.getElementById('livesEl');
    const levelEl = document.getElementById('levelEl');
    const finalScoreEl = document.getElementById('finalScore');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const victoryScreen = document.getElementById('victoryScreen');

    let animationId;
    let lastTime = 0;
    
    const gameState = {
        running: false,
        score: 0,
        lives: 3,
        level: 1,
        bricks: [],
        particles: []
    };

    // Responsive Canvas Sizing
    function resizeCanvas() {
        // Aspect ratio 4:3 usually works well, but let's go full dynamic
        // Max width 800 for playability
        let width = Math.min(window.innerWidth - 20, 800); 
        let height = Math.min(window.innerHeight - 20, 600);
        
        // Maintain a reasonable aspect ratio for gameplay
        if (height > width * 1.5) height = width * 1.5;
        
        canvas.width = width;
        canvas.height = height;

        // Reposition paddle if screen resizes
        if (paddle) {
            paddle.y = canvas.height - 30;
            paddle.width = canvas.width * 0.2; // 20% of screen width
        }
    }

    /**
     * Audio System (Synthesized sounds using Web Audio API)
     */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'hit') {
            // High pitched beep for brick hit
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'paddle') {
            // Lower thud for paddle
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'lose') {
            // Sad sound
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'win') {
            // Happy chord
            playNote(600, 0);
            playNote(800, 0.1);
            playNote(1000, 0.2);
        }
    }

    function playNote(freq, delay) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime + delay);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.3);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + 0.3);
    }

    /**
     * Game Entities
     */
    
    // BALL
    const ball = {
        x: 0, 
        y: 0, 
        dx: 4, 
        dy: -4, 
        radius: 8,
        speed: 5,
        color: '#fff',
        reset: function() {
            this.x = canvas.width / 2;
            this.y = canvas.height - 40;
            // Randomize start direction slightly
            this.dx = (Math.random() - 0.5) * 8; 
            this.dy = -this.speed;
        },
        draw: function() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        },
        update: function() {
            this.x += this.dx;
            this.y += this.dy;

            // Wall collisions
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.dx *= -1;
                playSound('paddle');
            }
            if (this.y - this.radius < 0) {
                this.dy *= -1;
                playSound('paddle');
            }
            
            // Floor collision (Game Over condition handled in main loop)
        }
    };

    // PADDLE
    const paddle = {
        x: 0,
        y: 0,
        width: 100,
        height: 15,
        color: '#38bdf8', // Cyan
        dx: 0,
        speed: 8,
        draw: function() {
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 5);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
            
            // Decorative line
            ctx.fillStyle = 'white';
            ctx.fillRect(this.x + this.width/2 - 10, this.y + 4, 20, 2);
        },
        update: function() {
            // Keyboard movement
            if (rightPressed && this.x < canvas.width - this.width) {
                this.x += this.speed;
            } else if (leftPressed && this.x > 0) {
                this.x -= this.speed;
            }
            
            // Mouse/Touch direct follow logic is handled in event listeners
        }
    };

    // PARTICLE SYSTEM
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 3 + 2;
            this.speedX = (Math.random() - 0.5) * 4;
            this.speedY = (Math.random() - 0.5) * 4;
            this.life = 1.0; // Opacity
            this.decay = Math.random() * 0.02 + 0.02;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    // BRICKS
    const brickConfig = {
        rowCount: 5,
        columnCount: 7, // Will be calculated based on width
        padding: 10,
        offsetTop: 50,
        offsetLeft: 35,
        height: 25
    };

    // Colors per row for visual flair
    const rowColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6'];

    function initBricks() {
        gameState.bricks = [];
        // Determine column count based on screen width
        const availableWidth = canvas.width - (2 * brickConfig.offsetLeft);
        const brickWidth = (availableWidth / brickConfig.columnCount) - brickConfig.padding;
        
        // Increase rows based on level
        const rows = Math.min(brickConfig.rowCount + (gameState.level - 1), 8);

        for(let c=0; c<brickConfig.columnCount; c++) {
            gameState.bricks[c] = [];
            for(let r=0; r<rows; r++) {
                const color = rowColors[r % rowColors.length];
                gameState.bricks[c][r] = { 
                    x: 0, 
                    y: 0, 
                    status: 1, 
                    color: color,
                    width: brickWidth 
                };
            }
        }
    }

    function drawBricks() {
        for(let c=0; c<brickConfig.columnCount; c++) {
            if(!gameState.bricks[c]) continue;
            for(let r=0; r<gameState.bricks[c].length; r++) {
                const b = gameState.bricks[c][r];
                if(b.status === 1) {
                    const brickX = (c * (b.width + brickConfig.padding)) + brickConfig.offsetLeft;
                    const brickY = (r * (brickConfig.height + brickConfig.padding)) + brickConfig.offsetTop;
                    b.x = brickX;
                    b.y = brickY;
                    
                    ctx.beginPath();
                    ctx.roundRect(brickX, brickY, b.width, brickConfig.height, 4);
                    ctx.fillStyle = b.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = b.color;
                    ctx.fill();
                    ctx.closePath();
                    ctx.shadowBlur = 0;
                    
                    // Shine effect
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(brickX, brickY, b.width, brickConfig.height/2);
                }
            }
        }
    }

    /**
     * Controls
     */
    let rightPressed = false;
    let leftPressed = false;

    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);
    document.addEventListener("mousemove", mouseMoveHandler, false);
    
    // Touch controls
    canvas.addEventListener("touchstart", touchHandler, {passive: false});
    canvas.addEventListener("touchmove", touchHandler, {passive: false});

    function keyDownHandler(e) {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true;
        else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true;
    }

    function keyUpHandler(e) {
        if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false;
        else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false;
    }

    function mouseMoveHandler(e) {
        const relativeX = e.clientX - canvas.offsetLeft;
        if(relativeX > 0 && relativeX < canvas.width) {
            paddle.x = relativeX - paddle.width / 2;
        }
    }

    function touchHandler(e) {
        e.preventDefault(); // Stop scrolling
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const relativeX = touch.clientX - rect.left;
        
        if(relativeX > 0 && relativeX < canvas.width) {
            paddle.x = relativeX - paddle.width / 2;
        }
    }

    /**
     * Core Game Logic
     */
    function createExplosion(x, y, color) {
        for (let i = 0; i < 10; i++) {
            gameState.particles.push(new Particle(x, y, color));
        }
    }

    function collisionDetection() {
        let activeBricks = 0;

        for(let c=0; c<brickConfig.columnCount; c++) {
            if(!gameState.bricks[c]) continue;
            for(let r=0; r<gameState.bricks[c].length; r++) {
                const b = gameState.bricks[c][r];
                if(b.status === 1) {
                    activeBricks++;
                    if(ball.x > b.x && ball.x < b.x + b.width && ball.y > b.y && ball.y < b.y + brickConfig.height) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        gameState.score += 10;
                        scoreEl.innerText = gameState.score;
                        playSound('hit');
                        createExplosion(b.x + b.width/2, b.y + brickConfig.height/2, b.color);
                    }
                }
            }
        }
        
        if (activeBricks === 0) {
            levelUp();
        }
    }

    function levelUp() {
        playSound('win');
        gameState.level++;
        ball.speed += 1;
        levelEl.innerText = gameState.level;
        ball.reset();
        initBricks();
    }

    function gameOver() {
        gameState.running = false;
        playSound('lose');
        finalScoreEl.innerText = gameState.score;
        gameOverScreen.classList.remove('hidden');
    }

    let lastFrameTime = 0; // 120Hz iPad対策
    function draw(now = performance.now()) {
        // 更新を60fps相当に間引く（120Hz端末で2倍速になるのを防ぐ）
        if (now - lastFrameTime < 15) {
            if (gameState.running) animationId = requestAnimationFrame(draw);
            return;
        }
        lastFrameTime = now;

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBricks();
        ball.draw();
        paddle.draw();

        // Update Particles
        for (let i = gameState.particles.length - 1; i >= 0; i--) {
            const p = gameState.particles[i];
            p.update();
            p.draw();
            if (p.life <= 0) {
                gameState.particles.splice(i, 1);
            }
        }

        if (gameState.running) {
            collisionDetection();
            ball.update();
            paddle.update();

            // Paddle Collision Logic
            // Simple bounding box for paddle top
            if (ball.y + ball.radius >= paddle.y && 
                ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x >= paddle.x && 
                ball.x <= paddle.x + paddle.width) {
                
                // Only bounce if coming from top
                if (ball.dy > 0) {
                    ball.dy = -ball.speed; // Reset vertical speed
                    playSound('paddle');
                    
                    // Add "English" (spin/angle) based on where it hit the paddle
                    const hitPoint = ball.x - (paddle.x + paddle.width / 2);
                    // Normalize hit point (-1 to 1)
                    let normalizedHit = hitPoint / (paddle.width / 2);
                    
                    // Adjust dx based on hit position (max angle sharpens at edges)
                    ball.dx = normalizedHit * (ball.speed * 1.5);
                }
            }

            // Life lost logic
            if(ball.y + ball.radius > canvas.height) {
                gameState.lives--;
                livesEl.innerText = gameState.lives;
                playSound('lose');
                if(!gameState.lives) {
                    gameOver();
                } else {
                    ball.reset();
                    // Small pause before relaunch
                    // Not implemented to keep loop simple, but ball resets position
                }
            }

            animationId = requestAnimationFrame(draw);
        }
    }

    /**
     * State Management
     */
    function startGame() {
        // Initialize sizes
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Reset State
        gameState.score = 0;
        gameState.lives = 3;
        gameState.level = 1;
        gameState.running = true;
        gameState.particles = [];
        
        // UI Update
        scoreEl.innerText = '0';
        livesEl.innerText = '3';
        levelEl.innerText = '1';
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        victoryScreen.classList.add('hidden');
        
        // Objects
        ball.reset();
        initBricks();
        
        // Audio Context needs user gesture to start
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (animationId) cancelAnimationFrame(animationId);
        draw();
    }

    // Button Listeners
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('playAgainBtn').addEventListener('click', startGame);

    // Initial Setup
    resizeCanvas();
    initBricks();
    // Render one frame for background
    paddle.y = canvas.height - 30;
    paddle.width = canvas.width * 0.2;
    drawBricks();
    paddle.draw();

</script>
</body>
</html>
